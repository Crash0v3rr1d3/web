name: Fetch Threat Intel Data

on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:

jobs:
  fetch-and-commit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch ransomware data
        run: node scripts/fetch-ransomware-data.mjs
        continue-on-error: true
        env:
          RANSOMWARE_API_KEY: ${{ secrets.RANSOMWARE_API_KEY }}

      - name: Fetch PoC data
        run: node scripts/fetch-poc-data.mjs
        continue-on-error: true

      - name: Fetch CVE data
        run: node scripts/fetch-cve-data.mjs
        continue-on-error: true

      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add src/data/remote/
          git diff --quiet && git diff --staged --quiet || (git commit -m "data: update cached threat intel data [skip netlify]" && git push)
